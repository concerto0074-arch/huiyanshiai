<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员登录 - 慧眼识癌</title>
    <!-- 引入Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <!-- 引入Font Awesome -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
    <style>
        /* 全局样式 - 统一 Premium 风格 */
        body {
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            overflow: hidden;
        }
        
        /* 登录容器 - 毛玻璃效果 */
        .login-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 28px;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.4);
            padding: 48px;
            width: 90%;
            max-width: 420px;
            animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        /* 标题样式 */
        .login-title {
            text-align: center;
            color: #ffffff;
            font-weight: 800;
            margin-bottom: 32px;
            font-size: 2rem;
            letter-spacing: -0.02em;
        }
        
        /* 输入框样式 */
        .form-group {
            position: relative;
            margin-bottom: 24px;
        }
        
        .form-control {
            height: 56px;
            border-radius: 14px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.03) !important;
            padding-left: 52px;
            font-size: 16px;
            color: #ffffff !important;
            transition: all 0.3s;
        }
        
        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }
        
        .form-control:focus {
            border-color: #3b82f6;
            background: rgba(255, 255, 255, 0.08) !important;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.2);
            outline: none;
        }
        
        /* 输入框图标 */
        .input-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            font-size: 1.1rem;
            pointer-events: none;
            transition: color 0.3s;
        }
        
        .form-control:focus + .input-icon {
            color: #3b82f6;
        }
        
        /* 登录按钮 */
        .login-btn {
            width: 100%;
            height: 56px;
            border-radius: 14px;
            font-size: 1.1rem;
            font-weight: 800;
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            border: none;
            color: white;
            transition: all 0.3s;
            box-shadow: 0 8px 25px rgba(37, 99, 235, 0.3);
            cursor: pointer;
        }
        
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(37, 99, 235, 0.4);
            filter: brightness(1.1);
        }
        
        .login-btn:active {
            transform: translateY(0);
        }
        
        /* 动画 */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* 装饰背景元素 */
        body::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: rgba(37, 99, 235, 0.1);
            filter: blur(100px);
            top: 10%;
            left: 10%;
            border-radius: 50%;
            z-index: -1;
        }
        body::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: rgba(124, 58, 237, 0.1);
            filter: blur(120px);
            bottom: 10%;
            right: 10%;
            border-radius: 50%;
            z-index: -1;
        }
    </style>
    <!-- 全局环境配置 -->
    <script src="config.js"></script>

    <style>
        /* 优化登录/注册模态框及弹窗排版 */
        .modal .nav-tabs {
            border-bottom: 1px solid #dee2e6;
            margin-bottom: 1rem;
            display: flex !important;
            flex-direction: row !important;
            flex-wrap: nowrap !important;
        }
        .modal .nav-tabs .nav-item {
            margin-bottom: -1px;
            flex: 1;
            width: 50%;
            text-align: center;
        }
        .modal .nav-tabs .nav-link {
            color: #6c757d !important;
            border: none;
            border-bottom: 2px solid transparent;
            font-weight: 500;
            padding: 10px 15px !important;
            border-radius: 0 !important;
            background: transparent !important;
            width: 100%;
        }
        .modal .nav-tabs .nav-link:hover {
            color: #007BFF !important;
            border-bottom: 2px solid #007BFF;
            border-color: #007BFF;
        }
        .modal .nav-tabs .nav-link.active {
            color: #007BFF !important;
            border-color: #007BFF;
            border-bottom: 2px solid #007BFF;
            font-weight: bold !important;
            background-color: transparent !important;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1 class="login-title">
            <i class="fa fa-lock mr-2"></i>管理员登录
        </h1>
        <form id="adminLoginForm">
            <div class="form-group position-relative">
                <i class="fa fa-user input-icon"></i>
                <input type="text" class="form-control" id="username" placeholder="请输入管理员账号" required>
            </div>
            <div class="form-group position-relative">
                <i class="fa fa-key input-icon"></i>
                <input type="password" class="form-control" id="password" placeholder="请输入管理员密码" required>
            </div>
            <button type="submit" class="btn btn-primary login-btn">登录</button>
        </form>
    </div>
    
    <!-- 引入jQuery和Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.min.js"></script>
    
    <script>
        // 管理员登录表单提交
        document.getElementById('adminLoginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            // 简单的前端验证
            if (username === '' || password === '') {
                alert('请输入账号和密码');
                return;
            }
            
            // 这里使用模拟的管理员账号验证（实际项目中应连接后端API）
            // 根据初始化脚本，管理员用户名是admin，密码是admin123
            if (username === 'admin' && password === 'admin123') {
                // 登录成功，设置本地存储
                localStorage.setItem('adminLoggedIn', 'true');
                alert('登录成功！');
                // 跳转到管理员后台页面
                window.location.href = 'admin_dashboard.html';
            } else {
                alert('登录失败：账号或密码错误');
            }
        });
    </script>
    <script src="js/auth.js"></script>
</body>
</html>
