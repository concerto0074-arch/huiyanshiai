<!-- 统一登录/注册模态框模板 -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>统一登录/注册模板</title>
    <!-- 全局环境配置 -->
    <script src="config.js"></script>

    <style>
        /* 优化登录/注册模态框及弹窗排版 */
        .modal .nav-tabs {
            border-bottom: 1px solid #dee2e6;
            margin-bottom: 1rem;
            display: flex !important;
            flex-direction: row !important;
            flex-wrap: nowrap !important;
        }
        .modal .nav-tabs .nav-item {
            margin-bottom: -1px;
            flex: 1;
            width: 50%;
            text-align: center;
        }
        .modal .nav-tabs .nav-link {
            color: #6c757d !important;
            border: none;
            border-bottom: 2px solid transparent;
            font-weight: 500;
            padding: 10px 15px !important;
            border-radius: 0 !important;
            background: transparent !important;
            width: 100%;
        }
        .modal .nav-tabs .nav-link:hover {
            color: #007BFF !important;
            border-bottom: 2px solid #007BFF;
            border-color: #007BFF;
        }
        .modal .nav-tabs .nav-link.active {
            color: #007BFF !important;
            border-color: #007BFF;
            border-bottom: 2px solid #007BFF;
            font-weight: bold !important;
            background-color: transparent !important;
        }
    </style>
</head>
<body>
    

    

    <!-- 用户信息模态框 -->
    <div class="modal fade" id="userInfoModal" tabindex="-1" role="dialog" aria-labelledby="userInfoModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg" role="document">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="userInfoModalLabel">用户中心</h5>
                    <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
                <div class="modal-body">
                    <div class="row">
                        <div class="col-md-3">
                            <div class="user-profile">
                                <div class="avatar">
                                    <i class="fas fa-user-circle fa-5x"></i>
                                </div>
                                <h4 id="userName">用户</h4>
                                <p id="userEmail">用户邮箱</p>
                            </div>
                        </div>
                        <div class="col-md-9">
                            <div class="nav nav-tabs" id="userTabs" role="tablist">
                                <a class="nav-item nav-link active" id="reports-tab" data-toggle="tab" href="#reports" role="tab" aria-controls="reports" aria-selected="true">我的报告</a>
                                <a class="nav-item nav-link" id="settings-tab" data-toggle="tab" href="#settings" role="tab" aria-controls="settings" aria-selected="false">设置</a>
                            </div>
                            <div class="tab-content mt-3" id="userTabsContent">
                                <div class="tab-pane fade show active" id="reports" role="tabpanel" aria-labelledby="reports-tab">
                                    <h5>历史报告</h5>
                                    <div id="reportsList" class="mt-3">
                                        <!-- 报告列表将通过JavaScript动态生成 -->
                                    </div>
                                </div>
                                <div class="tab-pane fade" id="settings" role="tabpanel" aria-labelledby="settings-tab">
                                    <h5>账户设置</h5>
                                    <div class="form-group">
                                        <label for="newPassword">新密码</label>
                                        <input type="password" class="form-control" id="newPassword" placeholder="请输入新密码">
                                    </div>
                                    <div class="form-group">
                                        <label for="confirmNewPassword">确认新密码</label>
                                        <input type="password" class="form-control" id="confirmNewPassword" placeholder="请再次输入新密码">
                                    </div>
                                    <button class="btn btn-primary" onclick="updatePassword()">修改密码</button>
                                    <button class="btn btn-danger" onclick="logout()">退出登录</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 登录注册功能 JavaScript -->
    <script>
        // 显示登录模态框
        function showLoginModal() {
            $('#loginModal').modal('show');
            $('#registerModal').modal('hide');
        }

        // 显示注册模态框
        function showRegisterModal() {
            $('#registerModal').modal('show');
            $('#loginModal').modal('hide');
        }

        // 显示用户信息模态框
        function showUserInfoModal() {
            $('#userInfoModal').modal('show');
            loadUserReports();
        }
        
        // 检查登录状态并显示用户中心
        function checkLoginAndShowCenter() {
            // 使用localStorage模拟登录状态
            const isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';
            
            if (isLoggedIn) {
                // 已登录则显示用户信息模态框
                showUserInfoModal();
            } else {
                // 未登录则显示登录模态框
                $('#loginModal').modal('show');
                alert('请先登录查看用户中心');
            }
        }

        

        

        // 检查登录状态（使用localStorage模拟）
        function checkLoginStatus() {
            // 从localStorage获取登录状态
            const isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';
            const username = localStorage.getItem('username') || '用户';
            const email = localStorage.getItem('email') || '';
            
            if (isLoggedIn) {
                // 已登录则显示用户中心按钮，隐藏登录按钮
                if (document.getElementById('navbarUserCenterBtn')) {
                    document.getElementById('navbarUserCenterBtn').style.display = 'block';
                }
                if (document.getElementById('navbarLoginBtn')) {
                    document.getElementById('navbarLoginBtn').style.display = 'none';
                }
                
                // 更新用户信息
                if (document.getElementById('userName')) {
                    document.getElementById('userName').textContent = username;
                }
                if (document.getElementById('userEmail')) {
                    document.getElementById('userEmail').textContent = email;
                }
            } else {
                // 未登录则隐藏用户中心按钮，显示登录按钮
                if (document.getElementById('navbarUserCenterBtn')) {
                    document.getElementById('navbarUserCenterBtn').style.display = 'none';
                }
                if (document.getElementById('navbarLoginBtn')) {
                    document.getElementById('navbarLoginBtn').style.display = 'block';
                }
            }
        }

        // 加载用户报告
        function loadUserReports() {
            const reportsList = document.getElementById('reportsList');
            
            // 模拟数据加载
            const mockReports = [
                { id: 1, name: '张女士', age: 45, riskScore: 85, date: '2023-01-15' },
                { id: 2, name: '李女士', age: 45, riskScore: 78, date: '2023-02-20' }
            ];
            
            reportsList.innerHTML = '';
            mockReports.forEach(report => {
                const reportCard = document.createElement('div');
                reportCard.className = 'card mb-3';
                reportCard.innerHTML = `
                    <div class="card-body">
                        <div class="row">
                            <div class="col-md-8">
                                <h5 class="card-title">癌症风险评估报告</h5>
                                <p class="card-text">被评估人：${report.name}</p>
                                <p class="card-text">年龄：${report.age}岁</p>
                                <p class="card-text">风险分数：${report.riskScore}分</p>
                                <p class="card-text text-muted">评估日期：${report.date}</p>
                            </div>
                            <div class="col-md-4 d-flex align-items-center justify-content-end">
                                <button class="btn btn-sm btn-primary" onclick="viewReport(${report.id})">查看报告</button>
                            </div>
                        </div>
                    </div>
                `;
                reportsList.appendChild(reportCard);
            });
        }
        
        // 查看报告详情
        function viewReport(patientId) {
            window.location.href = `report.html?id=${patientId}`;
        }
        
        // 修改密码
        function updatePassword() {
            const newPassword = document.getElementById('newPassword').value;
            const confirmNewPassword = document.getElementById('confirmNewPassword').value;
            
            if (newPassword !== confirmNewPassword) {
                alert('两次输入的密码不一致');
                return;
            }
            
            if (!newPassword) {
                alert('请输入新密码');
                return;
            }
            
            // 调用相应的API修改密码
            alert('密码修改功能待实现');
        }
        
        
        
        // 页面加载完成后检查登录状态
        document.addEventListener('DOMContentLoaded', function() {
            checkLoginStatus();
        });
    </script>
    
<!-- 登录模态框 -->
<div class="modal fade" id="loginModal" tabindex="-1" role="dialog" aria-labelledby="loginModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="loginModalLabel">账号登录</h5>
                <button type="button" class="close" data-dismiss="modal" aria-label="Close"><span aria-hidden="true">&times;</span></button>
            </div>
            <div class="modal-body"></div>
            <div class="modal-footer"></div>
        </div>
    </div>
</div>

<!-- 注册模态框 -->
<div class="modal fade" id="registerModal" tabindex="-1" role="dialog" aria-labelledby="registerModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="registerModalLabel">创建账号</h5>
                <button type="button" class="close" data-dismiss="modal" aria-label="Close"><span aria-hidden="true">&times;</span></button>
            </div>
            <div class="modal-body"></div>
            <div class="modal-footer"></div>
        </div>
    </div>
</div>

<script src="js/auth.js"></script>
</body>
</html>
