<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API测试页面</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- 全局环境配置 -->
    <script src="config.js"></script>
</head>
<body>
    <div class="container mt-5">
        <h1 class="text-center mb-4">后端API测试</h1>
        
        <!-- 健康检查 -->
        <div class="card mb-4">
            <div class="card-header">
                <h2 class="h5 mb-0">后端服务健康检查</h2>
            </div>
            <div class="card-body">
                <button id="healthCheckBtn" class="btn btn-primary">检查后端健康状态</button>
                <div id="healthResult" class="mt-3"></div>
            </div>
        </div>
        
        <!-- 模型列表 -->
        <div class="card mb-4">
            <div class="card-header">
                <h2 class="h5 mb-0">可用模型列表</h2>
            </div>
            <div class="card-body">
                <button id="getModelsBtn" class="btn btn-primary">获取模型列表</button>
                <div id="modelsResult" class="mt-3"></div>
            </div>
        </div>
        
        <!-- 预测测试 -->
        <div class="card">
            <div class="card-header">
                <h2 class="h5 mb-0">预测测试</h2>
            </div>
            <div class="card-body">
                <form id="predictForm">
                    <div class="form-group">
                        <label for="algorithm">选择算法</label>
                        <select class="form-control" id="algorithm">
                            <option value="random_forest">随机森林</option>
                            <option value="svm">支持向量机</option>
                            <option value="logistic_regression">逻辑回归</option>
                        </select>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group col-md-6">
                            <label for="age">年龄</label>
                            <input type="number" class="form-control" id="age" value="60">
                        </div>
                        <div class="form-group col-md-6">
                            <label for="gender">性别</label>
                            <select class="form-control" id="gender">
                                <option value="male">男</option>
                                <option value="female">女</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group col-md-6">
                            <label for="smoke">吸烟史</label>
                            <select class="form-control" id="smoke">
                                <option value="current">正在吸烟</option>
                                <option value="former">曾经吸烟</option>
                                <option value="never">从不吸烟</option>
                            </select>
                        </div>
                        <div class="form-group col-md-6">
                            <label for="bmi">BMI指数</label>
                            <input type="number" class="form-control" id="bmi" value="28.5" step="0.1">
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group col-md-6">
                            <label for="tumorMarker1">肿瘤标志物1</label>
                            <input type="number" class="form-control" id="tumorMarker1" value="150.5" step="0.1">
                        </div>
                        <div class="form-group col-md-6">
                            <label for="tumorMarker2">肿瘤标志物2</label>
                            <input type="number" class="form-control" id="tumorMarker2" value="60.2" step="0.1">
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="mutation1">基因突变1</label>
                        <select class="form-control" id="mutation1">
                            <option value="positive">阳性</option>
                            <option value="negative">阴性</option>
                            <option value="unknown">未知</option>
                        </select>
                    </div>
                    
                    <button type="button" id="predictBtn" class="btn btn-primary">执行预测</button>
                </form>
                
                <div id="predictResult" class="mt-3"></div>
            </div>
        </div>
    </div>
    
    <script>
        const API_BASE_URL = window.APP_CONFIG.API_BASE_URL + '/api';
        
        // 健康检查
        document.getElementById('healthCheckBtn').addEventListener('click', async () => {
            try {
                const response = await fetch(`${API_BASE_URL}/health`);
                const result = await response.json();
                document.getElementById('healthResult').innerHTML = `
                    <div class="alert alert-success">
                        <h4>后端服务正常运行</h4>
                        <p>已加载 ${result.models_loaded} 个模型</p>
                        <p>模型列表: ${result.models.join(', ')}</p>
                        <p>时间: ${new Date(result.timestamp).toLocaleString()}</p>
                    </div>
                `;
            } catch (error) {
                document.getElementById('healthResult').innerHTML = `
                    <div class="alert alert-danger">
                        <h4>后端服务不可用</h4>
                        <p>错误: ${error.message}</p>
                    </div>
                `;
            }
        });
        
        // 获取模型列表
        document.getElementById('getModelsBtn').addEventListener('click', async () => {
            try {
                const response = await fetch(`${API_BASE_URL}/models`);
                const result = await response.json();
                let html = `<h4>共找到 ${result.total} 个模型:</h4><ul class="list-group">`;
                result.models.forEach(model => {
                    html += `<li class="list-group-item">${model.name} - ${model.description}</li>`;
                });
                html += '</ul>';
                document.getElementById('modelsResult').innerHTML = html;
            } catch (error) {
                document.getElementById('modelsResult').innerHTML = `
                    <div class="alert alert-danger">
                        <h4>获取模型列表失败</h4>
                        <p>错误: ${error.message}</p>
                    </div>
                `;
            }
        });
        
        // 执行预测
        document.getElementById('predictBtn').addEventListener('click', async () => {
            try {
                const btn = document.getElementById('predictBtn');
                btn.classList.add('disabled');
                btn.innerHTML = '预测中...';
                
                const patientData = {
                    age: parseInt(document.getElementById('age').value),
                    gender: document.getElementById('gender').value,
                    smoke: document.getElementById('smoke').value,
                    bmi: parseFloat(document.getElementById('bmi').value),
                    tumorMarker1: parseFloat(document.getElementById('tumorMarker1').value),
                    tumorMarker2: parseFloat(document.getElementById('tumorMarker2').value),
                    mutation1: document.getElementById('mutation1').value
                };
                
                const algorithm = document.getElementById('algorithm').value;
                const response = await fetch(`${API_BASE_URL}/predict`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        algorithm: algorithm,
                        patient_data: patientData
                    })
                });
                
                const result = await response.json();
                
                // 显示结果
                let html = `
                    <div class="card mt-3">
                        <div class="card-header">
                            <h4>预测结果</h4>
                        </div>
                        <div class="card-body">
                            <h5>${algorithm} 算法预测</h5>
                            <div class="alert alert-${result.risk_level === 'high' ? 'danger' : result.risk_level === 'medium' ? 'warning' : 'success'}">
                                <h5>风险等级: ${result.risk_level === 'high' ? '高' : result.risk_level === 'medium' ? '中' : '低'}</h5>
                                <p>风险评分: ${result.risk_score}</p>
                                <p>置信度: ${result.confidence.toFixed(2)}%</p>
                            </div>
                            <h5>概率分布</h5>
                            <div class="progress mb-2">
                                <div class="progress-bar bg-success" style="width: ${result.probabilities.low}%">
                                    低风险: ${result.probabilities.low.toFixed(2)}%
                                </div>
                            </div>
                            <div class="progress mb-2">
                                <div class="progress-bar bg-warning" style="width: ${result.probabilities.medium}%">
                                    中风险: ${result.probabilities.medium.toFixed(2)}%
                                </div>
                            </div>
                            <div class="progress">
                                <div class="progress-bar bg-danger" style="width: ${result.probabilities.high}%">
                                    高风险: ${result.probabilities.high.toFixed(2)}%
                                </div>
                            </div>
                            <h5 class="mt-3">建议</h5>
                            <ul>
                                ${result.recommendations.map(rec => `<li>${rec}</li>`).join('')}
                            </ul>
                        </div>
                    </div>
                `;
                
                document.getElementById('predictResult').innerHTML = html;
                
                btn.classList.remove('disabled');
                btn.innerHTML = '执行预测';
            } catch (error) {
                document.getElementById('predictResult').innerHTML = `
                    <div class="alert alert-danger">
                        <h4>预测失败</h4>
                        <p>错误: ${error.message}</p>
                        <pre>${error.stack}</pre>
                    </div>
                `;
                
                const btn = document.getElementById('predictBtn');
                btn.classList.remove('disabled');
                btn.innerHTML = '执行预测';
            }
        });
    </script>
</body>
</html>
